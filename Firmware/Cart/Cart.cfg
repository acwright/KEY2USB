# =============================================================================
#  Cart.cfg - ld65 config for one 4K KEY2USB firmware bank
# =============================================================================
#
# The 28C64 EEPROM (8K) is split into two 4K banks by the MODE switch, which
# drives EEPROM A12:
#     MODE = GND  -> A12=0 -> lower 4K  = C64  bank
#     MODE = +5V  -> A12=1 -> upper 4K  = C128 bank
#
# Only bus A0-A11 reach the EEPROM, so each 4K bank mirrors across the whole
# $8000-$9FFF ROML window. We build each bank as a standalone 4K image that
# loads at $8000, then concatenate C64+C128 into the 8K EEPROM image.
#
# Fill value $FF matches erased EEPROM state.

MEMORY {
    # Scratch RAM the running firmware uses (not emitted to the ROM image).
    ZP:   start = $0002, size = $001A, type = rw, define = yes;
    RAM:  start = $C000, size = $1000, type = rw, define = yes;

    # The 4K ROM bank itself.
    ROM:  start = $8000, size = $1000, type = ro, file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    HEADER:   load = ROM, type = ro,  start = $8000;   # autostart vectors + signature
    CODE:     load = ROM, type = ro;
    RODATA:   load = ROM, type = ro;
    ZEROPAGE: load = ZP,  type = zp,  optional = yes;
    BSS:      load = RAM, type = bss, optional = yes;
}

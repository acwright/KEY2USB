; =============================================================================
;  KEY2USB controller - ATmega328/328P, bare-metal AVR + V-USB (no Arduino)
; =============================================================================
;  V-USB needs tight, deterministic interrupt timing, so this is a frameworkless
;  avr-gcc build rather than an Arduino one. usbconfig.h lives in include/ and
;  the V-USB stack is vendored in lib/usbdrv/.
;
;  Build:    pio run
;  Flash:    pio run -t upload         (writes CODE only, via minipro)
;  Fuses:    one-time, see fuses.cfg / Controller README (16 MHz crystal).
;
;  I have an ATmega328 (non-P) on the test PCB -> default env is atmega328.
;  Swap to env:atmega328p for production chips.

[platformio]
default_envs = atmega328

[env]
platform = atmelavr
build_flags =
    -Iinclude
    -DF_CPU=16000000UL
    -Os
    -Wall
    -ffunction-sections
    -fdata-sections
build_src_flags = -std=gnu11
; V-USB's usbdrvasm.S is GNU-assembler with C preprocessor; keep default rules.

[env:atmega328]
board = ATmega328
board_build.f_cpu = 16000000UL
upload_protocol = custom
; --fuses writes only the fuse bytes; without it minipro also tries to write a
; "user id" region (not present on the 328), which errors out.
upload_command = minipro -p "ATMEGA328@DIP28" -c code -w $SOURCE && minipro -p "ATMEGA328@DIP28" -c config -w fuses.cfg --fuses

[env:atmega328p]
board = ATmega328P
board_build.f_cpu = 16000000UL
upload_protocol = custom
upload_command = minipro -p "ATMEGA328P@DIP28" -c code -w $SOURCE && minipro -p "ATMEGA328P@DIP28" -c config -w fuses.cfg --fuses
